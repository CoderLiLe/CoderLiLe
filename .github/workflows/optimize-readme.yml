name: Optimize README

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: '强制优化'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run README optimization
        run: python optimize-readme.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet README.md || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "📈 优化 README：$(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.git-check.outputs.has_changes }}" = "true" ]; then
            echo "## 📊 优化报告" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ README.md 已成功优化并提交！" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 📊 优化报告" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ README.md 已是最新状态，无需优化。" >> "$GITHUB_STEP_SUMMARY"
          fi
