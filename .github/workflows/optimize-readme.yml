name: Optimize README

on:
  schedule:
    # 每周日凌晨3点运行
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: '强制优化（忽略最近更新时间）'
        required: false
        default: 'false'

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Run README optimization
        run: |
          python optimize-readme.py
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet README.md || echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "changes=$(git diff --stat README.md)" >> $GITHUB_OUTPUT
      
      - name: Configure Git
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Commit and push changes
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git add README.md
          git commit -m "📈 优化 README：$(date +'%Y-%m-%d %H:%M')"
          git push
      
      - name: Create summary
        run: |
          if [ "${{ steps.git-check.outputs.has_changes }}" = "true" ]; then
            echo "## 📊 优化报告" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ README.md 已成功优化并提交！" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**变更内容：**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.git-check.outputs.changes }}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## 📊 优化报告" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ README.md 已是最新状态，无需优化。" >> $GITHUB_STEP_SUMMARY
          fi