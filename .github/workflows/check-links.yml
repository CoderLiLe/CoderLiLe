name: Check Links

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress -- README.md

      - name: Report
        if: always()
        run: |
          {
            echo "## 🔗 链接检查报告"
            echo ""
            echo "检查时间: $(date)"
            echo ""
            echo "✅ 链接检查完成！"
          } >> "$GITHUB_STEP_SUMMARY"
